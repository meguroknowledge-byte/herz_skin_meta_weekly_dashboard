<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px;
}
.label {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-bottom: 12px;
  letter-spacing: 0.1em;
  font-family: 'EB Garamond', serif;
}
.creative {
  width: 1080px;
  height: 1920px;
  position: relative;
  overflow: hidden;
  background: #F7F5EF;
}

/* ── 上半分：KV手の写真 ── */
.kv-area {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 52%;

}
.kv-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 30%;
  filter: brightness(1.02);
}
.kv-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to bottom, transparent, #F7F5EF);
}

/* ── 商品画像：中央右寄り ── */
.product-area {
  position: absolute;
  top: 38%;
  right: 80px;
  width: 320px;
  height: 480px;
  overflow: hidden;
}
.product-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

/* ── トップバー ── */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: #D2D7B5;
  z-index: 10;
}

/* ── テキストエリア（下半分） ── */
.text-area {

  left: 80px;
  top: 55%;
  width: 560px;
}
.brand-name {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  letter-spacing: 0.35em;
  color: #888;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.divider {
  width: 40px;
  height: 1px;
  background: #D2D7B5;
  margin-bottom: 40px;
}
.main-copy {
  font-family: 'Noto Serif JP', serif;
  font-weight: 200;
  font-size: 52px;
  line-height: 1.85;
  color: #2a2a2a;
  letter-spacing: 0.04em;
  margin-bottom: 48px;
}
.main-copy .accent {
  color: #7a8a5c;
  font-weight: 300;
}
.divider2 {
  width: 52px;
  height: 1px;
  background: #D2D7B5;
  margin-bottom: 32px;
}
.sub-copy {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 17px;
  line-height: 2.5;
  color: #5a5a5a;
  letter-spacing: 0.07em;
  margin-bottom: 60px;
}
.cta-area {
  display: flex;
  align-items: center;
  gap: 20px;
}
.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 36px;
  background: #D2D7B5;
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.15em;
  color: #3a3a3a;
}
.cta-btn::after {
  content: '→';
  font-family: 'EB Garamond', serif;
  font-size: 16px;
}
.cta-sub {
  font-family: 'EB Garamond', serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: #aaa;
}

/* ── ボトム ── */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(to right, #D2D7B5 50%, rgba(210,215,181,0.3) 100%);
}
.bottom-brand {
  position: absolute;
  bottom: 52px;
  right: 80px;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 13px;
  letter-spacing: 0.25em;
  color: #aaa;
}

/* ── 装飾点 ── */
.dot-deco {
  position: absolute;
  top: 50%;
  left: 80px;
  width: 8px; height: 8px;
  border-radius: 50%;

}
